name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'LICENSE*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Tier 1: Static analysis + unit/contract tests ──────────────────────────
  check:
    name: Check & Test (unit)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-target-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (includes test code)
        run: cargo clippy --workspace --tests -- -D warnings

      - name: Test (unit + contract, no browser)
        run: cargo test --workspace

  # ── Tier 2: Browser E2E integration tests (sharded) ────────────────────────
  # Split into 3 parallel shards by test module to reduce wall-clock time.
  # Each shard runs on its own macOS runner with automatic retry for
  # transient Chrome launch failures.
  e2e:
    name: E2E (${{ matrix.shard }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard 1: foundation + integration (~128 tests, heaviest)
          - shard: "core"
            modules: "foundation integration"
          # Shard 2: state + runtime + orchestration (~104 tests)
          - shard: "runtime"
            modules: "state_workflow runtime_integration orchestration_runtime"
          # Shard 3: workflow + trigger (~63 tests, lightest)
          - shard: "workflow"
            modules: "workflow_extract_storage trigger_runtime"
    steps:
      - uses: actions/checkout@v5

      - name: Detect changed files
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**/*.rs'
              - 'crates/rub-cdp/src/stealth/patches/**/*.js'
              - 'crates/**/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/build.rs'
              - 'tests/**'
              - 'fixtures/**'

      - name: Resolve E2E gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changes.outputs.rust }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No browser-affecting files changed — E2E skipped."
          fi

      - name: Install Rust toolchain
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"

      - name: Cache cargo
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-e2e-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-e2e-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-e2e-cargo-

      - name: Cache build artifacts
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-e2e-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-e2e-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-e2e-target-

      - name: Install Chrome (if not present)
        if: steps.gate.outputs.run == 'true'
        run: |
          if ! command -v google-chrome &>/dev/null && ! command -v chromium-browser &>/dev/null; then
            brew install --cask google-chrome || true
          fi

      - name: Build rub binary
        if: steps.gate.outputs.run == 'true'
        run: cargo build --release

      - name: Run E2E shard
        if: steps.gate.outputs.run == 'true'
        timeout-minutes: 25
        run: |
          set -o pipefail
          MODULES="${{ matrix.modules }}"
          OVERALL_EXIT=0
          NON_RETRYABLE_FAILURE=0
          RETRYABLE_MODULES=""

          classify_e2e_failure() {
            local log="$1"
            if grep -q " FAILED$" "$log"; then
              echo "semantic_or_assertion"
              return
            fi
            if grep -Eiq "RUB_E2E_FAILURE_KIND=retryable_chrome_setup|Chrome.*not found|Chromium.*not found|DevToolsActivePort.*(missing|timed out)|failed to launch.*Chrome|failed to launch.*Chromium" "$log"; then
              echo "retryable_chrome_setup"
              return
            fi
            echo "unclassified_fail_closed"
          }

          echo "🧪 Running E2E shard: ${{ matrix.shard }}"
          echo "   Modules: $MODULES"
          echo ""

          # Run each module in the shard
          for module in $MODULES; do
            echo "━━━ Running module: $module ━━━"
            if ! cargo test --workspace -- --ignored "${module}::" 2>&1 | tee "/tmp/e2e_${module}.log"; then
              FAILURE_KIND="$(classify_e2e_failure "/tmp/e2e_${module}.log")"
              echo "::error title=E2E module failed::module=${module} kind=${FAILURE_KIND}"
              if [ "$FAILURE_KIND" = "retryable_chrome_setup" ]; then
                RETRYABLE_MODULES="$RETRYABLE_MODULES $module"
              else
                NON_RETRYABLE_FAILURE=1
              fi
              OVERALL_EXIT=1
            fi
            echo ""
          done

          # Retry only pre-test browser environment setup failures. Assertion,
          # projection, idempotency, and product semantic failures fail closed.
          if [ $NON_RETRYABLE_FAILURE -ne 0 ]; then
            exit 1
          elif [ $OVERALL_EXIT -ne 0 ] && [ -n "$(echo "$RETRYABLE_MODULES" | tr -d ' ')" ]; then
            echo ""
            echo "⚠️  Retrying retryable E2E setup failures..."
            echo "   Modules: $RETRYABLE_MODULES"
            echo ""
            RETRY_EXIT=0
            for module in $RETRYABLE_MODULES; do
              if ! cargo test --workspace -- --ignored "${module}::" 2>&1; then
                RETRY_EXIT=1
              fi
            done
            exit $RETRY_EXIT
          elif [ $OVERALL_EXIT -ne 0 ]; then
            exit 1
          fi

          echo "✅ All modules in shard passed"
        env:
          RUB_TEST_BINARY: ${{ github.workspace }}/target/release/rub
